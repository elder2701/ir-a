<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Приглашение на день рождения — 50 лет</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e9e9e9;
      padding: 0.6rem;
      font-family: 'Playfair Display', serif;
    }

    .card {
      width: 100%;
      max-width: 420px;
      height: 640px;
      max-height: 90vh;
      background: linear-gradient(135deg, #f6f6f6, #ffffff);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0;
    }

    .card-top {
      flex-shrink: 0;
      margin-top: -2rem;
      width: 100%;
      line-height: 0;
      mask-image: linear-gradient(to right, transparent 0%, black 5%, black 95%, transparent 100%);
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black 5%, black 95%, transparent 100%);
      mask-size: 100% 100%;
      -webkit-mask-size: 100% 100%;
    }

    .card-top img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      object-position: top center;
    }

    .wrapper {
      margin-top: -5rem;
    }

    .number {
      margin-top: -4rem;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }

    .number::before {
      content: '';
      position: absolute;
      left: 48%;
      top: 65%;
      transform: translate(-50%, -50%);
      width: 9.4em;
      height: 9.4em;
      background: linear-gradient(135deg, #f6f6f6, #ffffff);
      border-radius: 50%;
      z-index: 0;
    }

    .number span {
      position: relative;
      z-index: 1;
      font-size: 120px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      background: linear-gradient(#fff4c2, #d4af37, #b8952e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 4px 8px rgba(0, 0, 0, 0.25), 0 0 12px rgba(212, 175, 55, 0.6);
    }

    .script {
      font-family: 'Great Vibes', cursive;
      font-size: 42px;
      color: #444;
    }

    .goldText {
      color: #c7a63a;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-top: 6px;
    }

    .date {
      margin-top: 15px;
      font-size: 22px;
    }

    .time {
      font-family: 'Great Vibes', cursive;
      font-size: 30px;
      margin-top: 10px;
    }

    .place {
      margin-top: 18px;
      font-size: 14px;
      color: #555;
    }

    .from {
      margin-top: 26px;
      font-family: 'Great Vibes', cursive;
      font-size: 30px;
    }

  </style>
</head>
<body>
  <div class="card">
    <div class="card-top" aria-hidden="true">
      <img src="img/balloons-gold.png" alt="">
    </div>
    <div class="wrapper">
      <div class="number"><span>50</span></div>
      <div class="script">Приглашаю на</div>
      <div class="goldText">ДЕНЬ РОЖДЕНИЯ</div>
      <div class="date">21 марта</div>
      <div class="time">Собираемся в 16:00</div>
      <div class="place">
        Отель Cosmos, зал "Панорамный" (11 этаж)<br>
        г. ПЕТРОЗАВОДСК, УЛ. КУЙБЫШЕВА, 26
      </div>
      <div class="from">Ваша Ирина</div>
    </div>
  </div>
</body>
</html>
